name: ci
on: [push, pull_request]

jobs:
  pr-lane:                       # fast lane — must be green to merge (VALIDATION.md §7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check mieinfo
      - run: pytest -q -m "not slow"

  full-lane:                     # nightly/full lane: slow cross-checks + all gates
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: python -m mieinfo.cli validate
